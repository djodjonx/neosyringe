name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: ./.github/actions/setup-node-pnpm
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Build
        run: pnpm build

      - name: Sync README to neosyringe package
        run: pnpm sync-readme

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-examples:
    name: Update example versions
    runs-on: ubuntu-latest
    needs: [release-please, publish]
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Bump example versions
        run: node scripts/update-examples.mjs

      - name: Commit updated examples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add examples/nuxt/package.json examples/nestjs/package.json
          git diff --staged --quiet || git commit -m "chore(examples): bump @djodjonx package versions [skip ci]"
          git push
